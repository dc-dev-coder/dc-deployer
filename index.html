<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Smart Deployer</title>
    <!-- Using a more stable CDN link -->
    <script src="https://unpkg.com/@octokit/rest@19.0.7/dist/index.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --primary: #0969da; --bg: #f6f8fa; --text: #24292f; --success: #2ea44f; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 15px; border: 1px solid #d0d7de; border-radius: 12px; }
        section { border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px; }
        h3 { font-size: 0.85rem; text-transform: uppercase; color: #57606a; margin-bottom: 10px; }
        input, select, textarea, button { width: 100%; padding: 12px; margin-bottom: 8px; border: 1px solid #d0d7de; border-radius: 8px; box-sizing: border-box; font-size: 0.95rem; }
        button { background: var(--primary); color: white; border: none; font-weight: 600; cursor: pointer; }
        .btn-ghost { background: #f3f4f6; color: #24292f; border: 1px solid #d0d7de; font-size: 0.8rem; }
        .btn-deploy { background: var(--success); height: 55px; font-size: 1.1rem; }
        .status-box { background: #1b1f23; color: #7ee787; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 0.75rem; max-height: 200px; overflow-y: auto; border: 1px solid #30363d; }
        .flex { display: flex; gap: 8px; }
        textarea { height: 100px; font-family: monospace; font-size: 0.8rem; background: #fffdef; }
    </style>
</head>
<body>

<div class="container">
    <section>
        <h3>1. Account & Repository</h3>
        <div class="flex">
            <select id="tokenSelect" onchange="fetchRepos()"><option value="">-- Select Account --</option></select>
            <button class="btn-ghost" style="width: 80px;" onclick="toggleAddToken()">Add +</button>
        </div>
        
        <div id="tokenForm" style="display:none; background: #f0f7ff; padding: 10px; border-radius: 8px; margin-bottom: 10px;">
            <input type="text" id="tokenLabel" placeholder="Nickname">
            <input type="password" id="newToken" placeholder="ghp_Token">
            <button onclick="saveToken()">Save Token</button>
        </div>

        <select id="repoSelect"><option value="">-- Choose Repository --</option></select>
        <input type="text" id="branch" value="main" placeholder="Branch">
    </section>

    <section>
        <h3>2. Mapping Rules</h3>
        <textarea id="renameRules" placeholder="file-from-agent.tsx => /src/components/page.tsx"></textarea>
        <input type="file" id="ruleFile" accept=".txt">
    </section>

    <section>
        <h3>3. Push Files</h3>
        <input type="file" id="fileInput" multiple>
        <button class="btn-deploy" onclick="handleDeployment()">Sync to GitHub</button>
        <div id="status" class="status-box">Ready.</div>
    </section>
</div>

<script>
    let tokens = JSON.parse(localStorage.getItem('gh_tokens') || '{}');

    function log(msg, color = "#7ee787") {
        const s = document.getElementById('status');
        s.innerHTML += `<div style="color:${color}">> ${msg}</div>`;
        s.scrollTop = s.scrollHeight;
    }

    function toggleAddToken() {
        const f = document.getElementById('tokenForm');
        f.style.display = f.style.display === 'none' ? 'block' : 'none';
    }

    function saveToken() {
        const l = document.getElementById('tokenLabel').value.trim();
        const t = document.getElementById('newToken').value.trim();
        if(l && t) { 
            tokens[l] = t; 
            localStorage.setItem('gh_tokens', JSON.stringify(tokens)); 
            renderTokens(); 
            toggleAddToken();
            log(`Account "${l}" ready.`);
        }
    }

    function renderTokens() {
        const s = document.getElementById('tokenSelect');
        s.innerHTML = '<option value="">-- Select Account --</option>';
        Object.keys(tokens).forEach(k => s.innerHTML += `<option value="${tokens[k]}">${k}</option>`);
    }

    async function fetchRepos() {
        const token = document.getElementById('tokenSelect').value;
        const rSelect = document.getElementById('repoSelect');
        if(!token) return;
        
        rSelect.innerHTML = '<option>Loading...</option>';
        
        try {
            // Using the UMD global Octokit constructor
            const octokit = new Octokit({ auth: token });
            const { data } = await octokit.repos.listForAuthenticatedUser({ 
                sort: 'updated', 
                per_page: 100,
                affiliation: 'owner,collaborator,organization_member' 
            });

            rSelect.innerHTML = '';
            data.forEach(r => {
                const opt = document.createElement('option');
                opt.value = r.full_name;
                opt.textContent = r.full_name;
                rSelect.appendChild(opt);
            });
            log(`Fetched ${data.length} repos.`);
        } catch (e) {
            log(`Error fetching: ${e.message}`, "#ffa198");
        }
    }

    async function handleDeployment() {
        const token = document.getElementById('tokenSelect').value;
        const repoFull = document.getElementById('repoSelect').value;
        const branch = document.getElementById('branch').value;
        const fileInput = document.getElementById('fileInput');
        const ruleFile = document.getElementById('ruleFile').files[0];
        let ruleText = document.getElementById('renameRules').value;

        if(!token || !repoFull || fileInput.files.length === 0) return alert("Fill all fields");

        if (ruleFile) ruleText += '\n' + await ruleFile.text();

        const rules = {};
        ruleText.split('\n').forEach(line => {
            if(line.includes('=>')) {
                const [src, dest] = line.split('=>').map(s => s.trim());
                if(src && dest) rules[src] = dest;
            }
        });

        const octokit = new Octokit({ auth: token });
        const [owner, repo] = repoFull.split('/');
        
        for (const file of fileInput.files) {
            let targetPath = rules[file.name] || file.name;
            targetPath = targetPath.replace(/^\//, '');

            const reader = new FileReader();
            const b64 = await new Promise(r => {
                reader.onload = () => r(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });

            log(`Pushing: ${targetPath}`);
            try {
                let sha;
                try {
                    const res = await octokit.repos.getContent({ owner, repo, path: targetPath, ref: branch });
                    sha = res.data.sha;
                } catch (e) {}

                await octokit.repos.createOrUpdateFileContents({
                    owner, repo, path: targetPath, branch,
                    message: "Mobile Sync",
                    content: b64, sha
                });
                log(`Success: ${targetPath}`);
            } catch (err) {
                log(`Failed: ${targetPath} - ${err.message}`, "#ffa198");
            }
        }
    }

    // Check if Octokit loaded correctly
    window.onload = () => {
        if (typeof Octokit === 'undefined') {
            log("Critical: Octokit library failed to load. Try refreshing.", "#ffa198");
        }
        renderTokens();
    };
</script>
</body>
</html>
